name: Fill Contributions
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set git identity
        run: |
          git config --global user.name "Ty-XiaoYi"
          git config --global user.email "${{ secrets.EMAIL }}"

      - name: Generate history commits
        run: |
          START="2024-01-01"
          END=$(date +%Y-%m-%d)
          CUR="$START"
          while [ "$CUR" != "$END" ]; do
            echo "$CUR" > dummy.txt
            git add dummy.txt
            GIT_COMMITTER_DATE="$CUR 12:00:00" git commit --date="$CUR 12:00:00" -m "data: $CUR"
            CUR=$(date -d "$CUR +1 day" +%Y-%m-%d)
          done

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          branch: ${{ github.head_ref || github.ref_name }}
